name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    - name: Build NTT Binary
  run: RUSTFLAGS="-C target-feature=+avx2" cargo build --release --bin ntt

- name: Build Inverse NTT Binary
  run: RUSTFLAGS="-C target-feature=+avx2" cargo build --release --bin invntt

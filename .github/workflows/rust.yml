name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    name: Rust Single Main CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # Compiler ko bolna ki AVX2 code compile kare
  RUSTFLAGS: "-C target-feature=+avx2"

jobs:
  build_only:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache Setup
      uses: swatinem/rust-cache@v2

    # --- CRITICAL FIX: SIRF BUILD CHECK KARNA HAI ---
    - name: Verify AVX2 Compilation (Release Mode)
      run: cargo build --release

name: Rust Benchmark Engine CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # GitHub ke CPU ko bolna ki AVX2 capabilities ko unlock kare compile-time par
  RUSTFLAGS: "-C target-feature=+avx2"

jobs:
  build_and_run_benchmark:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust Stable Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cargo Cache Setup
      uses: swatinem/rust-cache@v2

    # --- YEH STEP BINARY COMPILE KAREGA ---
    - name: Compile Extreme Production Build
      run: cargo build --release

    # --- YEH HAI AAPKI STOPWATCH JALANE WALI COMMAND ---
    - name: Execute Live NTT & iNTT Benchmarks
      run: cargo run --release
